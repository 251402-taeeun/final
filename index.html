<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 장소 검색 서비스</title>
    <style>
        /* 기본 여백 제거 및 전체 높이 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 전체를 감싸는 컨테이너: Flexbox를 사용하여 좌우로 분할 */
        .app-container {
            display: flex;
            height: 100%;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        .sidebar {
            width: 350px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 2; /* 지도보다 위에 보이도록 설정 */
        }

        /* 검색 영역 스타일 */
        .search-area {
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .search-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .search-area button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오톡 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 영역 */
        .result-list {
            flex: 1;
            overflow-y: auto; /* 내용이 많아지면 스크롤 생성 */
            list-style: none;
        }

        .result-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .result-item:hover {
            background-color: #e9ecef;
        }

        .result-item .place-name {
            font-weight: bold;
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        .result-item .place-address {
            font-size: 13px;
            color: #777;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1; /* 남은 공간을 모두 차지하도록 설정 */
            position: relative;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="search-area">
                <input type="text" id="keyword" placeholder="장소를 검색해보세요 (예: 강남역 맛집)" onkeypress="if(event.keyCode==13){searchPlaces();}">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="placesList" class="result-list">
                </ul>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=551d282e9cb6796473204793bf81469d&libraries=services"></script>
    
    <script>
        // 전역 변수 선언
        let map; // 지도 객체
        let ps; // 장소 검색 객체
        let markers = []; // 지도에 표시된 마커들을 담을 배열

        // 페이지가 완전히 로드된 후 실행 (로딩 오류 방지)
        window.onload = function() {
            // 카카오맵 API가 완전히 준비되었을 때 콜백 함수 실행
            kakao.maps.load(function() {
                initMap();
            });
        };

        // 지도 초기화 함수
        function initMap() {
            const mapContainer = document.getElementById('map'); 
            
            // 기본 위치 설정 (위치 권한을 거부할 경우를 대비해 서울시청을 기본값으로 설정)
            let centerPosition = new kakao.maps.LatLng(37.566826, 126.9786567);

            // 지도 옵션 설정 (조건: 확대 레벨 5)
            const mapOptions = {
                center: centerPosition,
                level: 5 
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 객체 생성
            ps = new kakao.maps.services.Places();

            // 위치 권한 허용 받아 현재 위치로 이동
            if (navigator.geolocation) {
                // GeoLocation을 이용해서 접속 위치를 얻어옵니다
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude; // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 현재 위치로 변경합니다
                    map.setCenter(currentPosition);
                    
                    // 현재 위치에 마커 표시 (선택 사항)
                    new kakao.maps.Marker({
                        map: map,
                        position: currentPosition
                    });
                }, function(error) {
                    console.error("위치 정보를 가져올 수 없습니다: ", error);
                    alert("위치 정보를 가져올 수 없어 기본 위치로 설정합니다.");
                });
            } else {
                alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
            }
        }

        // 키워드 검색을 요청하는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('검색어를 입력해주세요!');
                return false;
            }

            // 장소검색 객체를 통해 키워드로 장소검색을 요청합니다
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면
                // 검색 목록과 마커를 표출합니다
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
                return;
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
                return;
            }
        }

        // 검색 결과 목록과 마커를 표출하는 함수입니다
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 검색 결과 목록에 추가된 항목들을 모두 지웁니다
            listEl.innerHTML = '';
            
            // 지도에 표시되고 있는 기존 마커를 모두 제거합니다
            removeMarkers();
            
            for (let i = 0; i < places.length; i++) {
                // 마커를 생성하고 지도에 표시합니다
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                
                // 검색 결과 항목 Element를 생성합니다
                const itemEl = getListItem(i, places[i]);

                // 검색된 장소 위치를 기준으로 지도 범위를 재설정하기 위해
                // LatLngBounds 객체에 좌표를 추가합니다
                bounds.extend(placePosition);

                // 리스트 아이템 클릭 시 해당 위치로 지도 중심 이동
                itemEl.onclick = function() {
                    map.setCenter(placePosition);
                    map.setLevel(3); // 클릭 시 조금 더 확대해서 보여줌
                };

                listEl.appendChild(itemEl);
            }       

            // 검색된 장소 위치를 기준으로 지도 범위를 재설정합니다
            map.setBounds(bounds);
        }

        // 검색결과 항목을 Element로 반환하는 함수입니다
        function getListItem(index, places) {
            const el = document.createElement('li');
            el.className = 'result-item';

            let itemStr = `<span class="place-name">${places.place_name}</span>`;
            
            if (places.road_address_name) {
                itemStr += `<span class="place-address">${places.road_address_name}</span>`;
            } else {
                itemStr += `<span class="place-address">${places.address_name}</span>`;
            }
            
            el.innerHTML = itemStr;
            return el;
        }

        // 마커를 생성하고 지도 위에 마커를 표시하는 함수입니다
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position // 마커의 위치
            });

            marker.setMap(map); // 지도 위에 마커를 표출합니다
            markers.push(marker); // 배열에 생성된 마커를 추가합니다

            return marker;
        }

        // 지도 위에 표시되고 있는 기존 마커를 모두 제거합니다
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }   
            markers = [];
        }
    </script>
</body>
</html>
